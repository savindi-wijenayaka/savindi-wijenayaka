name: Update Chronicles

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest Medium posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://medium.com/feed/@savindi-wijenayaka"
          max_post_count: 5
          readme_path: README.md
          template: "- \U0001F4DC [$title]($url) — *$date*"
          date_format: "MMM DD, YYYY"
          commit_message: "chore: update chronicles with latest scrolls [skip ci]"
