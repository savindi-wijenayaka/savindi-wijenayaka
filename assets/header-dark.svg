<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#c9a227" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style>
    .s  { animation: twinkle 2.2s ease-in-out infinite, drift 5s ease-in-out infinite; }
    .spk { transform-box: fill-box; transform-origin: center; animation: sparkle 3.5s ease-in-out infinite; }
    .gem { transform-box: fill-box; transform-origin: center; animation: crystalGlow 2s ease-in-out infinite; }
    @keyframes twinkle    { 0%,100%{ opacity:.15 } 50%{ opacity:.95 } }
    @keyframes drift      { 0%,100%{ transform:translateY(0px) } 50%{ transform:translateY(-6px) } }
    @keyframes sparkle    { 0%,100%{ opacity:0; transform:scale(.15) } 50%{ opacity:1; transform:scale(1) } }
    @keyframes crystalGlow{ 0%,100%{ opacity:.8 } 50%{ opacity:1 } }
  </style>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Pixel corner brackets — top-left -->
  <rect x="10" y="10" width="24" height="3" fill="#c9a227"/>
  <rect x="10" y="10" width="3"  height="24" fill="#c9a227"/>
  <rect x="36" y="10" width="4"  height="3" fill="#c9a227" opacity=".4"/>
  <rect x="10" y="36" width="3"  height="4" fill="#c9a227" opacity=".4"/>
  <!-- top-right -->
  <rect x="866" y="10" width="24" height="3" fill="#c9a227"/>
  <rect x="887" y="10" width="3"  height="24" fill="#c9a227"/>
  <rect x="860" y="10" width="4"  height="3" fill="#c9a227" opacity=".4"/>
  <rect x="887" y="36" width="3"  height="4" fill="#c9a227" opacity=".4"/>
  <!-- bottom-left -->
  <rect x="10"  y="267" width="24" height="3" fill="#c9a227"/>
  <rect x="10"  y="243" width="3"  height="24" fill="#c9a227"/>
  <rect x="36"  y="267" width="4"  height="3" fill="#c9a227" opacity=".4"/>
  <rect x="10"  y="239" width="3"  height="4" fill="#c9a227" opacity=".4"/>
  <!-- bottom-right -->
  <rect x="866" y="267" width="24" height="3" fill="#c9a227"/>
  <rect x="887" y="243" width="3"  height="24" fill="#c9a227"/>
  <rect x="860" y="267" width="4"  height="3" fill="#c9a227" opacity=".4"/>
  <rect x="887" y="239" width="3"  height="4" fill="#c9a227" opacity=".4"/>

  <!-- Dashed border lines -->
  <line x1="36" y1="11.5"  x2="862" y2="11.5"  stroke="#c9a227" stroke-width="1" stroke-dasharray="4 3" opacity=".4"/>
  <line x1="36" y1="268.5" x2="862" y2="268.5" stroke="#c9a227" stroke-width="1" stroke-dasharray="4 3" opacity=".4"/>

  <!-- Stars -->
  <circle class="s" cx="105" cy="26"  r="1.8" fill="#c9a227" style="animation-delay:.0s,.1s"/>
  <circle class="s" cx="218" cy="20"  r="1.5" fill="#a78bfa" style="animation-delay:.5s,.8s"/>
  <circle class="s" cx="355" cy="16"  r="2.0" fill="#c9a227" style="animation-delay:1s,.4s"/>
  <circle class="s" cx="502" cy="14"  r="1.5" fill="#a78bfa" style="animation-delay:1.5s,1.6s"/>
  <circle class="s" cx="648" cy="19"  r="1.8" fill="#c9a227" style="animation-delay:.3s,2s"/>
  <circle class="s" cx="795" cy="25"  r="1.5" fill="#a78bfa" style="animation-delay:2s,.7s"/>
  <circle class="s" cx="858" cy="130" r="1.5" fill="#c9a227" style="animation-delay:.8s,3s"/>
  <circle class="s" cx="78"  cy="155" r="1.5" fill="#a78bfa" style="animation-delay:1.2s,2.5s"/>
  <circle class="s" cx="118" cy="258" r="1.8" fill="#c9a227" style="animation-delay:2.5s,1.2s"/>
  <circle class="s" cx="455" cy="262" r="1.5" fill="#a78bfa" style="animation-delay:.7s,3.5s"/>
  <circle class="s" cx="765" cy="257" r="1.5" fill="#c9a227" style="animation-delay:1.8s,2s"/>
  <circle class="s" cx="845" cy="248" r="2.0" fill="#a78bfa" style="animation-delay:3s,.3s"/>

  <!-- Sparkle crosses -->
  <g class="spk" style="animation-delay:.0s">
    <rect x="131"   y="51"   width="9" height="2" rx="1" fill="#c9a227"/>
    <rect x="134.5" y="47.5" width="2" height="9" rx="1" fill="#c9a227"/>
  </g>
  <g class="spk" style="animation-delay:1.4s">
    <rect x="816"   y="57"   width="9" height="2" rx="1" fill="#a78bfa"/>
    <rect x="819.5" y="53.5" width="2" height="9" rx="1" fill="#a78bfa"/>
  </g>
  <g class="spk" style="animation-delay:2.2s">
    <rect x="796"   y="247"   width="9" height="2" rx="1" fill="#c9a227"/>
    <rect x="799.5" y="243.5" width="2" height="9" rx="1" fill="#c9a227"/>
  </g>

  <!-- Crystal gem — left side -->
  <g class="gem" transform="translate(55,132) scale(0.9) translate(-55,-132)">
    <ellipse cx="55" cy="133" rx="20" ry="22" fill="#7c3aed" opacity=".28"/>
    <polygon points="55,98 39,127 43,149 55,165 67,149 71,127" fill="#7c3aed"/>
    <polygon points="55,98 44,117 58,112" fill="#a78bfa" opacity=".8"/>
    <polygon points="43,149 55,165 49,145" fill="#5b21b6" opacity=".7"/>
    <circle cx="49" cy="109" r="2.5" fill="#ddd6fe" opacity=".9"/>
    <rect x="52"    y="90"    width="6"   height="1.5" rx=".75" fill="#c9a227" opacity=".7"/>
    <rect x="54.25" y="87.75" width="1.5" height="6"   rx=".75" fill="#c9a227" opacity=".7"/>
  </g>

  <!-- Pixel-art tome — right side -->
  <g transform="translate(847,132) scale(0.81) translate(-847,-132)">
  <g style="animation:crystalGlow 2s ease-in-out infinite;animation-delay:1s">
    <ellipse cx="847" cy="132" rx="20" ry="22" fill="#7c3aed" opacity=".28"/>
    <rect x="829" y="101" width="7"  height="62" rx="1" fill="#5b21b6"/>
    <rect x="836" y="98"  width="28" height="68" rx="1" fill="#7c3aed"/>
    <rect x="864" y="100" width="5"  height="64" rx="1" fill="#2d1b4e"/>
    <polygon points="850,114 856,126 850,138 844,126" fill="#a78bfa" opacity=".8"/>
    <polygon points="850,119 854,126 850,133 846,126" fill="#ddd6fe" opacity=".55"/>
    <rect x="858" y="98"  width="3" height="18" fill="#c9a227" opacity=".8"/>
    <polygon points="858,116 859.5,113 861,116" fill="#c9a227" opacity=".8"/>
    <rect x="838" y="101" width="4" height="14" rx="1" fill="#ddd6fe" opacity=".4"/>
    <rect x="844"    y="90"    width="6"   height="1.5" rx=".75" fill="#c9a227" opacity=".7"/>
    <rect x="846.25" y="87.75" width="1.5" height="6"   rx=".75" fill="#c9a227" opacity=".7"/>
  </g>
  </g>

  <!-- Name -->
  <text x="450" y="95"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="44" font-weight="bold" letter-spacing="3"
        fill="#f0e6d3" filter="url(#soft-shadow)">SAVINDI WIJENAYAKA</text>

  <!-- Subtitle -->
  <text x="450" y="128"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="20" font-style="italic" letter-spacing="1.5"
        fill="#c9a227">&#10022;  ML ENGINEER  &#183;  RESEARCHER  &#183;  WRITER  &#183;  PHOTOGRAPHER  &#10022;</text>

  <!-- Level badge -->
  <rect x="295" y="145" width="310" height="24" rx="2" fill="#c9a227"/>
  <text x="450" y="163"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="15" letter-spacing="1"
        fill="#1a0a2e">[ LVL 6  &#183;  CLASS: CREATOR ]</text>

  <!-- XP category bars -->
  <!-- ACADEMIA (left) -->
  <text x="175" y="188" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="10" letter-spacing="1" fill="#c9a227">ACADEMIA</text>
  <rect x="120" y="196" width="16" height="16" rx="1" fill="#c9a227" opacity=".9"/>
  <rect x="139" y="196" width="16" height="16" rx="1" fill="#c9a227" opacity=".9"/>
  <rect x="158" y="196" width="16" height="16" rx="1" fill="#c9a227" opacity=".9"/>
  <rect x="177" y="196" width="16" height="16" rx="1" fill="#c9a227" opacity=".12"/>
  <rect x="196" y="196" width="16" height="16" rx="1" fill="#c9a227" opacity=".12"/>
  <rect x="215" y="196" width="16" height="16" rx="1" fill="#c9a227" opacity=".12"/>

  <!-- INDUSTRY (middle — accent) -->
  <text x="450" y="188" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="10" letter-spacing="1" fill="#a78bfa">INDUSTRY</text>
  <rect x="395" y="196" width="16" height="16" rx="1" fill="#a78bfa" opacity=".85"/>
  <rect x="414" y="196" width="16" height="16" rx="1" fill="#a78bfa" opacity=".85"/>
  <rect x="433" y="196" width="16" height="16" rx="1" fill="#a78bfa" opacity=".12"/>
  <rect x="452" y="196" width="16" height="16" rx="1" fill="#a78bfa" opacity=".12"/>
  <rect x="471" y="196" width="16" height="16" rx="1" fill="#a78bfa" opacity=".12"/>
  <rect x="490" y="196" width="16" height="16" rx="1" fill="#a78bfa" opacity=".12"/>

  <!-- REST (right) -->
  <text x="725" y="188" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="10" letter-spacing="1" fill="#c9a227" opacity=".5">REST</text>
  <rect x="670" y="196" width="16" height="16" rx="1" fill="#c9a227" opacity=".3"/>
  <rect x="689" y="196" width="16" height="16" rx="1" fill="#c9a227" opacity=".12"/>
  <rect x="708" y="196" width="16" height="16" rx="1" fill="#c9a227" opacity=".12"/>
  <rect x="727" y="196" width="16" height="16" rx="1" fill="#c9a227" opacity=".12"/>
  <rect x="746" y="196" width="16" height="16" rx="1" fill="#c9a227" opacity=".12"/>
  <rect x="765" y="196" width="16" height="16" rx="1" fill="#c9a227" opacity=".12"/>

  <!-- XP bar -->
  <rect x="170" y="224" width="560" height="6" rx="3" fill="#c9a227" opacity=".15"/>
  <circle cx="167" cy="227" r="3" fill="#c9a227" opacity=".4"/>
  <circle cx="733" cy="227" r="3" fill="#c9a227" opacity=".4"/>
  <rect x="170" y="224" height="6" rx="3" fill="#c9a227" opacity=".75" width="0">
    <animate attributeName="width" from="0" to="560" dur="2s" fill="freeze" begin="0.4s"/>
  </rect>
</svg>
